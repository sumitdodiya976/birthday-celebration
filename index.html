<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Varsha ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:420px;
background:white;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.2);
animation:fade 2s;
position:relative;
z-index:2;
}

h1{
color:#ff4d6d;
font-size:34px;
}

h2{
margin-top:10px;
color:#444;
}

p{
margin-top:20px;
line-height:1.7;
font-size:18px;
color:#555;
}

button{
margin-top:30px;
padding:15px 30px;
border:none;
background:#ff4d6d;
color:white;
font-size:18px;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Hearts */

.heart{
position:absolute;
font-size:25px;
animation:float 7s linear infinite;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(100vh) rotate(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="card">

<h1>🎂 Happy Birthday</h1>

<h2>🌸 Varsha 🌸</h2>

<p>

Har saal July me barish aati hai... ☔<br><br>

Lekin is baar sabse khoobsurat "Varsha" ka Birthday bhi aaya hai. ❤️<br><br>

May your smile always shine brighter than every rainbow after the rain. 🌈<br><br>

Stay happy, stay blessed...<br>

Happy Birthday once again! 🎉

</p>

<button onclick="blast()">
🎁 Celebrate
</button>

</div>

<script>

/* Hearts */

function createHeart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=4+Math.random()*4+"s";

h.style.fontSize=20+Math.random()*25+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

}

setInterval(createHeart,300);


/* Confetti */

const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");

canvas.width=innerWidth;

canvas.height=innerHeight;

let pieces=[];

function Confetti(){

this.x=Math.random()*canvas.width;

this.y=Math.random()*canvas.height-canvas.height;

this.r=Math.random()*6+4;

this.d=Math.random()*60;

this.color=`hsl(${Math.random()*360},100%,60%)`;

this.tilt=Math.random()*10;

}

for(let i=0;i<180;i++){

pieces.push(new Confetti());

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

});

update();

requestAnimationFrame(draw);

}

function update(){

pieces.forEach(p=>{

p.y+=3;

p.x+=Math.sin(p.d);

if(p.y>canvas.height){

p.y=-10;

p.x=Math.random()*canvas.width;

}

});

}

draw();

function blast(){

for(let i=0;i<150;i++){

pieces.push(new Confetti());

}

alert("🎉 Happy Birthday Varsha! 🎂❤️");

}

</script>

</body>
</html>
